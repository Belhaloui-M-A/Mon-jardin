# =============================================
# Profil PRODUCTION
# Activer avec : SPRING_PROFILES_ACTIVE=prod
# =============================================

# Les secrets DOIVENT être fournis par l'environnement (aucune valeur de repli :
# si la variable est absente, l'application refuse de démarrer — fail-fast).
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}

# Cookies transmis sur HTTPS uniquement
app.cookie.secure=true

# Schéma : validation seule, jamais de modification automatique en production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logs réduits (pas de DEBUG applicatif en production)
logging.level.com.plantverde=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN
