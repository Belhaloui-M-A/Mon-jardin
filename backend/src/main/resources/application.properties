# =============================================
# PlantVerde - Configuration principale
# =============================================

# Server
server.port=8080
server.servlet.context-path=/api

# =============================================
# Base de données PostgreSQL
# =============================================


# connect avec postgresql
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mon-jardin}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:m123}


# connect avec neon
# spring.datasource.url=${DB_URL:jdbc:postgresql://ep-mute-frost-as7zjrfj-pooler.c-4.eu-central-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
# spring.datasource.username=${DB_USERNAME:neondb_owner}
# spring.datasource.password=${DB_PASSWORD:npg_xbYgMeBGV7L8}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool (bonnes pratiques)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================
# JWT - Sécurité
# =============================================
# Ces valeurs de repli sont réservées au DÉVELOPPEMENT local.
# En production : profil `prod` (application-prod.properties) qui exige les variables
# d'environnement JWT_ACCESS_SECRET / JWT_REFRESH_SECRET (aucune valeur par défaut).
app.jwt.access-secret=${JWT_ACCESS_SECRET:plantVerde_Access_SecretKey_2024_VeryLongAndSecure_AtLeast256Bits}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:plantVerde_Refresh_SecretKey_2024_VeryLongAndSecure_AtLeast256Bits}
app.jwt.access-expiration=900000
# 15 minutes en ms
app.jwt.refresh-expiration=604800000
# 7 jours en ms

# =============================================
# Cookies
# =============================================
app.cookie.secure=${COOKIE_SECURE:false}
# true en production (HTTPS)
app.cookie.domain=${COOKIE_DOMAIN:localhost}
app.cookie.same-site=Strict

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# =============================================
# Upload fichiers (images plantes)
# =============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# Logging
# =============================================
logging.level.com.plantverde=DEBUG
logging.level.org.springframework.security=WARN
logging.level.root=WARN
